<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Images — SEO Inspector</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:        oklch(22% 0.04 270);
    --ink-2:      oklch(35% 0.03 270);
    --muted:      oklch(56% 0.02 270);
    --line:       oklch(92% 0.01 270);
    --line-2:     oklch(96% 0.008 270);
    --bg:         oklch(98.5% 0.005 270);
    --surface:    #ffffff;
    --nav:        oklch(20% 0.05 275);
    --nav-ink:    oklch(98% 0.01 270);
    --nav-muted:  oklch(72% 0.04 275);
    --accent:     oklch(58% 0.21 280);
    --accent-2:   oklch(94% 0.04 280);
    --warn:       oklch(62% 0.18 35);
    --warn-bg:    oklch(96% 0.04 35);
    --ok:         oklch(58% 0.16 155);
    --ok-bg:      oklch(95% 0.05 155);
    --shadow-sm:  0 1px 0 oklch(20% 0.05 275 / 0.04), 0 1px 2px oklch(20% 0.05 275 / 0.04);
    --shadow-md:  0 1px 0 oklch(20% 0.05 275 / 0.04), 0 6px 18px -8px oklch(20% 0.05 275 / 0.12);
    --radius:     14px;
    --radius-sm:  9px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    font-feature-settings: "ss01","cv11","cv02";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.45;
  }

  .app {
    max-width: 920px;
    margin: 0 auto;
    padding: 20px 18px 64px;
  }

  /* ---------- nav (matches existing screens) ---------- */
  .nav {
    background: var(--nav);
    color: var(--nav-ink);
    border-radius: 16px;
    padding: 14px 8px;
    display: flex;
    align-items: center;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav a {
    color: var(--nav-muted);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    padding: 8px 14px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    transition: color .18s ease, background .18s ease;
  }
  .nav a svg { width: 16px; height: 16px; opacity: .85; }
  .nav a:hover { color: var(--nav-ink); }
  .nav a[aria-current="page"] {
    color: var(--nav-ink);
    background: oklch(28% 0.06 275);
  }
  .nav .spacer { flex: 1; }
  .nav .gear {
    color: var(--nav-muted);
    padding: 8px;
    border-radius: 10px;
  }
  .nav .gear:hover { color: var(--nav-ink); }

  /* ---------- panel ---------- */
  .panel {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    margin-top: 14px;
    overflow: hidden;
  }

  /* ---------- header strip ---------- */
  .header {
    padding: 18px 20px 14px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: end;
  }
  .header h1 {
    margin: 0;
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 28px;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .header h1 em { font-style: italic; color: var(--accent); }
  .header .sub {
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
  }
  .header .sub b {
    color: var(--ink);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .download-all {
    appearance: none;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
    font: inherit;
    font-weight: 600;
    font-size: 13px;
    padding: 8px 12px 8px 10px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease, transform .08s ease;
    box-shadow: var(--shadow-sm);
  }
  .download-all:hover { border-color: oklch(80% 0.02 270); background: oklch(99% 0.005 270); }
  .download-all:active { transform: translateY(1px); }
  .download-all svg { width: 14px; height: 14px; }

  /* ---------- toolbar ---------- */
  .toolbar {
    padding: 4px 20px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--line-2);
  }

  .chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1 1 auto;
    min-width: 0;
  }
  .chip {
    appearance: none;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink-2);
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 10px 5px 9px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: all .15s ease;
    font-variant-numeric: tabular-nums;
  }
  .chip:hover { border-color: oklch(80% 0.02 270); }
  .chip[aria-pressed="true"] {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--surface);
  }
  .chip .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
    opacity: .55;
  }
  .chip .count {
    font-size: 11px;
    opacity: .7;
    font-weight: 500;
  }
  .chip[aria-pressed="true"] .count { opacity: .8; }

  .view-toggle {
    display: inline-flex;
    background: oklch(96% 0.008 270);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 2px;
  }
  .view-toggle button {
    appearance: none;
    background: transparent;
    border: 0;
    width: 30px; height: 26px;
    border-radius: 7px;
    color: var(--muted);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background .15s ease, color .15s ease;
  }
  .view-toggle button[aria-pressed="true"] {
    background: var(--surface);
    color: var(--ink);
    box-shadow: 0 1px 2px oklch(20% 0.05 275 / 0.08);
  }
  .view-toggle button:hover { color: var(--ink); }
  .view-toggle svg { width: 14px; height: 14px; }

  /* ---------- list view ---------- */
  .list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .row {
    display: grid;
    grid-template-columns: 84px 1fr auto;
    gap: 16px;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line-2);
    transition: background .15s ease;
  }
  .row:last-child { border-bottom: 0; }
  .row:hover { background: oklch(99% 0.005 270); }

  .thumb {
    width: 84px; height: 64px;
    border-radius: 10px;
    background: oklch(96% 0.008 270);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background-image:
      linear-gradient(45deg, oklch(94% 0.008 270) 25%, transparent 25%),
      linear-gradient(-45deg, oklch(94% 0.008 270) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, oklch(94% 0.008 270) 75%),
      linear-gradient(-45deg, transparent 75%, oklch(94% 0.008 270) 75%);
    background-size: 12px 12px;
    background-position: 0 0, 0 6px, 6px -6px, -6px 0;
  }
  .thumb img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }
  .thumb.broken {
    background: var(--warn-bg);
    color: var(--warn);
    background-image: none;
  }
  .thumb.broken svg { width: 22px; height: 22px; }

  .meta { min-width: 0; }
  .filename {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    direction: rtl;
    text-align: left;
  }
  .alt {
    margin-top: 4px;
    font-size: 12.5px;
    color: var(--ink-2);
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .alt.missing {
    color: var(--warn);
    font-style: italic;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .alt.missing svg { width: 12px; height: 12px; flex-shrink: 0; }

  .specs {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
    color: var(--muted);
    font-size: 11.5px;
    font-variant-numeric: tabular-nums;
    align-items: center;
  }
  .specs .tag {
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
    font-size: 10.5px;
    color: var(--accent);
    background: var(--accent-2);
    padding: 1px 6px;
    border-radius: 4px;
  }
  .specs .sep {
    width: 2px; height: 2px; border-radius: 50%;
    background: oklch(80% 0.02 270);
  }

  .actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transform: translateX(4px);
    transition: opacity .18s ease, transform .18s ease;
  }
  .row:hover .actions,
  .row:focus-within .actions { opacity: 1; transform: translateX(0); }

  .icon-btn {
    appearance: none;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--ink-2);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all .15s ease;
  }
  .icon-btn:hover {
    color: var(--ink);
    border-color: oklch(78% 0.02 270);
    background: oklch(98% 0.005 270);
  }
  .icon-btn.primary {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--surface);
  }
  .icon-btn.primary:hover { background: oklch(28% 0.04 270); }
  .icon-btn svg { width: 14px; height: 14px; }

  /* ---------- grid view ---------- */
  .grid {
    display: grid;
    gap: 1px;
    background: var(--line-2);
    grid-template-columns: repeat(3, 1fr);
  }
  .card {
    background: var(--surface);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    transition: background .15s ease;
  }
  .card:hover { background: oklch(99% 0.005 270); }
  .card .thumb {
    width: 100%;
    height: 130px;
    border-radius: 8px;
  }
  .card .filename { font-size: 11.5px; }
  .card .alt { font-size: 11.5px; }
  .card .specs { font-size: 10.5px; gap: 3px 8px; }
  .card .specs .tag { font-size: 9.5px; }
  .card .card-actions {
    position: absolute;
    top: 10px; right: 10px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transform: translateY(-2px);
    transition: opacity .18s ease, transform .18s ease;
  }
  .card:hover .card-actions,
  .card:focus-within .card-actions { opacity: 1; transform: translateY(0); }
  .card .icon-btn {
    width: 28px; height: 28px;
    box-shadow: var(--shadow-sm);
  }

  /* ---------- empty / footer ---------- */
  .empty {
    padding: 56px 20px;
    text-align: center;
    color: var(--muted);
    display: none;
  }
  .empty.show { display: block; }
  .empty .em {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--ink);
    display: block;
    margin-bottom: 6px;
  }

  .credit {
    margin-top: 12px;
    text-align: right;
    color: var(--muted);
    font-size: 12px;
    padding: 0 4px;
  }
  .credit b { color: var(--ink); font-weight: 700; letter-spacing: -0.01em; }

  /* ---------- responsive ---------- */
  @media (max-width: 640px) {
    .header { grid-template-columns: 1fr; }
    .grid { grid-template-columns: repeat(2, 1fr); }
    .row { grid-template-columns: 64px 1fr; padding: 12px 14px; }
    .row .actions {
      grid-column: 1 / -1;
      opacity: 1;
      transform: none;
      justify-content: flex-end;
    }
    .thumb { width: 64px; height: 56px; }
    .card .thumb { height: 110px; }
  }
  @media (max-width: 420px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* hidden state */
  [hidden] { display: none !important; }
</style>
</head>

  <!-- main panel -->
  <section class="panel">

    <header class="header">
      <div>
        <h1>Page <em>imagery</em></h1>
        <div class="sub">
          <b id="visibleCount">17</b> of <b>17</b> images
          <span style="margin: 0 6px; color: oklch(80% 0.02 270);">·</span>

    <div class="toolbar" role="toolbar" aria-label="Filter and view options">

      <div class="view-toggle" role="group" aria-label="View">

        </button>

    </div>

    <ul class="list" id="list" hidden></ul>
    <div class="grid" id="grid" hidden></div>

    <div class="empty" id="empty">
      <span class="em">Nothing matches.</span>
      Try a different file type filter.
    </div>
  </section>

  <p class="credit">Created by <b>Detailed</b> × <b style="color: var(--accent);">Ahrefs</b></p>
</div>

  ];

  // ---------- helpers ----------
  const $ = sel => document.querySelector(sel);
  const fmtSize = b => {
    if (!b) return '—';
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(b < 10 * 1024 ? 1 : 0) + ' KB';
    return (b / (1024 * 1024)).toFixed(2) + ' MB';
  };
  const fmtTotal = b => {
    if (b < 1024 * 1024) return (b / 1024).toFixed(0) + ' KB';
    return (b / (1024 * 1024)).toFixed(1) + ' MB';
  };
  const elt = (tag, cls, html) => {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  };

  // ---------- state ----------
  const state = {
    types: new Set(['ALL']),  // 'ALL' or specific types
    view:  'list',
  };

  // ---------- chips (only types actually present) ----------
  function buildChips() {
    const counts = {};
    for (const i of IMAGES) counts[i.type] = (counts[i.type] || 0) + 1;
    const types = Object.keys(counts).sort();

    const chips = $('#chips');
    chips.innerHTML = '';

    const all = elt('button', 'chip', `All <span class="count">${IMAGES.length}</span>`);
    all.dataset.type = 'ALL';
    all.setAttribute('aria-pressed', 'true');
    all.type = 'button';
    chips.appendChild(all);

    for (const t of types) {
      const c = elt('button', 'chip', `<span class="dot"></span>${t} <span class="count">${counts[t]}</span>`);
      c.dataset.type = t;
      c.setAttribute('aria-pressed', 'false');
      c.type = 'button';
      chips.appendChild(c);
    }

    chips.addEventListener('click', e => {
      const btn = e.target.closest('.chip');
      if (!btn) return;
      const t = btn.dataset.type;
      if (t === 'ALL') {
        state.types = new Set(['ALL']);
      } else {
        state.types.delete('ALL');
        if (state.types.has(t)) state.types.delete(t);
        else state.types.add(t);
        if (state.types.size === 0) state.types = new Set(['ALL']);
      }
      // sync chip pressed states
      chips.querySelectorAll('.chip').forEach(c => {
        const active = state.types.has(c.dataset.type);
        c.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
      render();
    });
  }

  // ---------- filtering ----------
  function visible() {
    if (state.types.has('ALL')) return IMAGES;
    return IMAGES.filter(i => state.types.has(i.type));
  }

  // ---------- row / card ----------
  function thumbHTML(img) {
    if (img.broken) {
      return `<div class="thumb broken" title="Image failed to load">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11"/><path d="m21 21-6-6"/><path d="m15 21 6-6"/></svg>
      </div>`;
    }
    return `<div class="thumb"><img src="${img.src}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.parentElement.classList.add('broken'); this.remove(); this.parentElement.innerHTML='<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;><path d=&quot;M21 16V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11&quot;/><path d=&quot;m21 21-6-6&quot;/><path d=&quot;m15 21 6-6&quot;/></svg>'"></div>`;
  }

  function metaHTML(img) {
    const altLine = img.alt
      ? `<div class="alt" title="${img.alt.replace(/"/g, '&quot;')}">${img.alt}</div>`
      : `<div class="alt missing"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4"/><path d="M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg>Missing alt text</div>`;
    return `
      <div class="meta">
        <div class="filename" title="${img.name}">${img.name}</div>
        ${altLine}
        <div class="specs">
          <span class="tag">${img.type}</span>
          <span>${img.w}&thinsp;×&thinsp;${img.h}</span>
          <span class="sep"></span>
          <span>${fmtSize(img.bytes)}</span>
        </div>
      </div>`;
  }

  function actionsHTML(idx) {
    return `
      <div class="actions">
        <button class="icon-btn" title="Copy URL" data-act="copy" data-i="${idx}" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <button class="icon-btn" title="Open in new tab" data-act="open" data-i="${idx}" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>
        </button>
        <button class="icon-btn primary" title="Download" data-act="dl" data-i="${idx}" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
        </button>
      </div>`;
  }

  function render() {
    const items = visible();
    const list = $('#list');
    const grid = $('#grid');
    const empty = $('#empty');

    list.innerHTML = '';
    grid.innerHTML = '';

    if (items.length === 0) {
      list.hidden = true;
      grid.hidden = true;
      empty.classList.add('show');
    } else {
      empty.classList.remove('show');
      if (state.view === 'list') {
        list.hidden = false;
        grid.hidden = true;
        items.forEach((img, idx) => {
          const li = elt('li', 'row');
          li.dataset.i = IMAGES.indexOf(img);
          li.innerHTML = thumbHTML(img) + metaHTML(img) + actionsHTML(IMAGES.indexOf(img));
          list.appendChild(li);
        });
      } else {
        grid.hidden = false;
        list.hidden = true;
        items.forEach(img => {
          const card = elt('div', 'card');
          card.innerHTML = thumbHTML(img) + metaHTML(img) + `
            <div class="card-actions">
              <button class="icon-btn" title="Open" data-act="open" data-i="${IMAGES.indexOf(img)}" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg></button>
              <button class="icon-btn primary" title="Download" data-act="dl" data-i="${IMAGES.indexOf(img)}" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg></button>
            </div>`;
          grid.appendChild(card);
        });
      }
    }

    // header counts
    $('#visibleCount').textContent = items.length;
    const totalBytes = items.reduce((s, i) => s + (i.bytes || 0), 0);
    $('#totalSize').textContent = fmtTotal(totalBytes);
    const missing = items.filter(i => !i.alt).length;
    $('#missingAlt').textContent = missing;
    $('#missingAlt').style.color = missing ? 'var(--warn)' : 'var(--ok)';
  }

  // ---------- view toggle ----------
  $('#viewList').addEventListener('click', () => setView('list'));
  $('#viewGrid').addEventListener('click', () => setView('grid'));
  function setView(v) {
    state.view = v;
    $('#viewList').setAttribute('aria-pressed', v === 'list' ? 'true' : 'false');
    $('#viewGrid').setAttribute('aria-pressed', v === 'grid' ? 'true' : 'false');
    render();
  }

  // ---------- row actions (delegated) ----------
  document.addEventListener('click', async e => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    const img = IMAGES[Number(btn.dataset.i)];
    if (!img) return;
    if (btn.dataset.act === 'copy') {
      try { await navigator.clipboard.writeText(img.src); flash(btn, 'Copied'); }
      catch { flash(btn, 'Failed'); }
    } else if (btn.dataset.act === 'open') {
      window.open(img.src, '_blank', 'noopener');
    } else if (btn.dataset.act === 'dl') {
      const a = document.createElement('a');
      a.href = img.src;
      a.download = img.name;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }
  });

  function flash(el, msg) {
    const original = el.getAttribute('title');
    el.setAttribute('title', msg);
    el.style.transform = 'scale(0.92)';
    setTimeout(() => { el.style.transform = ''; el.setAttribute('title', original || ''); }, 600);
  }

  $('#downloadAll').addEventListener('click', () => {
    const items = visible().filter(i => !i.broken);
    items.forEach((img, k) => setTimeout(() => {
      const a = document.createElement('a');
      a.href = img.src; a.download = img.name; a.rel = 'noopener';
      document.body.appendChild(a); a.click(); a.remove();
    }, k * 120));
  });

  // ---------- init ----------
  buildChips();
  render();
</script>
</body>
</html>
