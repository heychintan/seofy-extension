<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Seofy</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>
<div class="app">

  <nav class="nav" id="nav" aria-label="Seofy sections">
    <span class="brand" aria-hidden="true">
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="6"/><path d="m20 20-4.5-4.5"/></svg>
      </span>
      <span class="brand-name">SEOFY</span>
    </span>
    <span class="nav-sep" aria-hidden="true"></span>
    <a href="#" data-tab="overview" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4h7a3 3 0 0 1 3 3v13"/><path d="M22 4h-7a3 3 0 0 0-3 3v13"/></svg>Overview</a>
    <a href="#" data-tab="headings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>Headings</a>
    <a href="#" data-tab="schema"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h12M3 18h18"/></svg>Schema</a>
    <a href="#" data-tab="images"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>Images</a>
    <a href="#" data-tab="links"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 14a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 10a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>Links</a>
    <a href="#" data-tab="social"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5 8.6 10.5"/></svg>Social</a>
    <a href="#" data-tab="advanced"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m3 9 18 0M9 21V9"/></svg>Advanced</a>
  </nav>

  <section class="panel" id="panel">

    <!-- Loading -->
    <div class="state" id="loading">
      <div class="spinner" aria-hidden="true"></div>
      <span>Scanning page…</span>
    </div>

    <!-- Restricted page error -->
    <div class="state" id="error" hidden>
      <span class="em">Can't read this page.</span>
      <span id="errorMsg">Seofy can't run on Chrome system pages (chrome://, the Web Store, etc). Open a regular website and try again.</span>
    </div>

    <!-- Tab views — all hidden until data arrives -->
    <div class="tab" id="tab-overview" hidden></div>
    <div class="tab" id="tab-headings" hidden></div>
    <div class="tab" id="tab-links"    hidden></div>
    <div class="tab" id="tab-images"   hidden></div>
    <div class="tab" id="tab-schema"   hidden></div>
    <div class="tab" id="tab-social"   hidden></div>
    <div class="tab" id="tab-advanced" hidden></div>

  </section>

  <p class="credit">Created with <b>Seofy</b></p>
</div>

<script src="popup.js"></script>
</body>
</html>
